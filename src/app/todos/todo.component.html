<div class="todo-container">
  <h1 class="todo-title">To-Do List</h1>

  <form class="todo-form" (ngSubmit)="addTodo()">
    <input
      class="todo-input"
      type="text"
      [(ngModel)]="newTitle"
      name="newTitle"
      placeholder="Enter a new task..."
      aria-label="New task title"
    />
    <button class="todo-add-btn" type="submit">Add</button>
  </form>

  <p class="todo-empty" *ngIf="todos.length === 0">
    No to-do items yet. Add one above!
  </p>

  <ul class="todo-list" *ngIf="todos.length > 0">
    <li
      class="todo-item"
      *ngFor="let todo of todos"
      [class.todo-item--completed]="todo.completed"
    >
      <input
        class="todo-checkbox"
        type="checkbox"
        [checked]="todo.completed"
        (change)="toggleTodo(todo.id)"
        [attr.aria-label]="'Mark ' + todo.title + ' as ' + (todo.completed ? 'incomplete' : 'complete')"
      />
      <span class="todo-item-title">{{ todo.title }}</span>
      <button
        class="todo-delete-btn"
        type="button"
        (click)="deleteTodo(todo.id)"
        [attr.aria-label]="'Delete ' + todo.title"
      >
        Delete
      </button>
    </li>
  </ul>
</div>
