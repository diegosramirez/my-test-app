<div class="todo-container">
  <h1>To-Do List</h1>

  <form class="todo-form" (ngSubmit)="addTodo()">
    <input
      type="text"
      class="todo-input"
      placeholder="Enter a new task..."
      [(ngModel)]="newTaskDescription"
      name="newTaskDescription"
      aria-label="New task description"
      autofocus
    />
    <button
      type="submit"
      class="todo-add-btn"
      [disabled]="!newTaskDescription.trim()"
    >
      Add Task
    </button>
  </form>

  <p class="todo-empty" *ngIf="todos.length === 0">
    No tasks yet. Add one above!
  </p>

  <ul class="todo-list" *ngIf="todos.length > 0">
    <li
      *ngFor="let todo of todos"
      class="todo-item"
      [class.todo-item--completed]="todo.completed"
    >
      <label class="todo-label">
        <input
          type="checkbox"
          class="todo-checkbox"
          [(ngModel)]="todo.completed"
          [name]="'todo-' + todo.id"
          [attr.aria-label]="'Mark &quot;' + todo.description + '&quot; as ' + (todo.completed ? 'incomplete' : 'complete')"
        />
        <span class="todo-description">{{ todo.description }}</span>
      </label>
    </li>
  </ul>

  <div class="todo-summary" *ngIf="todos.length > 0">
    <span>{{ completedCount }} / {{ todos.length }} completed</span>
  </div>
</div>
