<div class="todo-container">
  <h1>To-Do List</h1>

  <div class="todo-input-row">
    <input
      type="text"
      [(ngModel)]="newTaskText"
      (keyup.enter)="addTask()"
      placeholder="Enter a new task..."
      aria-label="New task description"
    />
    <button (click)="addTask()">Add</button>
  </div>

  <ul class="todo-list">
    <li *ngFor="let task of tasks" class="todo-item">
      <input
        type="checkbox"
        [checked]="task.completed"
        (change)="toggleTask(task)"
        [attr.aria-label]="'Mark task complete: ' + task.text"
      />
      <span [style.text-decoration]="task.completed ? 'line-through' : 'none'"
            [style.opacity]="task.completed ? '0.6' : '1'">
        {{ task.text }}
      </span>
      <button (click)="removeTask(task)" aria-label="Remove task">Remove</button>
    </li>
  </ul>

  <p *ngIf="tasks.length === 0" class="todo-empty">No tasks yet. Add one above!</p>
</div>
