<div class="movie-card">
  <div class="movie-header">
    <h3 class="movie-title" [innerHTML]="getHighlightedTitle()"></h3>
    <div class="watched-badge" [class.watched]="movie.watched" [class.unwatched]="!movie.watched">
      {{ movie.watched ? 'Watched' : 'Unwatched' }}
    </div>
  </div>

  <div class="movie-details">
    <p class="movie-genre">{{ movie.genre }}</p>
    <p class="movie-year">{{ movie.year }}</p>
  </div>

  <div class="movie-actions">
    <button
      class="action-btn watched-btn"
      [class.active]="movie.watched"
      (click)="onWatchedToggle()"
      [title]="movie.watched ? 'Mark as unwatched' : 'Mark as watched'">
      {{ movie.watched ? '✓' : '○' }}
    </button>

    <button
      class="action-btn edit-btn"
      (click)="onEdit()"
      title="Edit movie">
      ✏️
    </button>

    <button
      class="action-btn delete-btn"
      (click)="onDelete()"
      title="Delete movie">
      🗑️
    </button>
  </div>
</div>
