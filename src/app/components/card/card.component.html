<div class="card" [class.card--editing]="editing" [attr.aria-roledescription]="editing ? null : 'draggable task'">
  @if (!editing) {
    <div class="card__drag-handle" cdkDragHandle aria-label="Drag to reorder">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <circle cx="5" cy="3" r="1.5"/><circle cx="11" cy="3" r="1.5"/>
        <circle cx="5" cy="8" r="1.5"/><circle cx="11" cy="8" r="1.5"/>
        <circle cx="5" cy="13" r="1.5"/><circle cx="11" cy="13" r="1.5"/>
      </svg>
    </div>
    <div class="card__content">
      <h4 class="card__title">{{ task.title }}</h4>
      @if (task.description) {
        <p class="card__description">{{ task.description }}</p>
      }
    </div>
    <div class="card__actions">
      <button
        #editButton
        class="card__action-btn"
        (click)="startEdit()"
        [attr.aria-label]="'Edit task: ' + task.title"
        type="button"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button
        class="card__action-btn card__action-btn--delete"
        (click)="taskDeleted.emit()"
        [attr.aria-label]="'Delete task: ' + task.title"
        type="button"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </button>
    </div>
    <div class="card__move-menu">
      <span class="card__move-label">Move to:</span>
      @for (colId of otherColumns; track colId) {
        <button
          class="card__move-btn"
          (click)="moveToColumn(colId)"
          [attr.aria-label]="'Move task to ' + (allColumnTitles[colId] || colId)"
          type="button"
        >
          {{ allColumnTitles[colId] || colId }}
        </button>
      }
    </div>
  } @else {
    <div class="card__edit-form">
      <div class="card__field">
        <input
          #editTitleInput
          class="card__edit-input"
          [class.card__edit-input--invalid]="editTitleInvalid"
          [(ngModel)]="editTitle"
          (keydown)="onEditKeydown($event)"
          (blur)="editTitleTouched = true"
          [maxlength]="100"
          placeholder="Task title"
          aria-label="Task title"
        />
        @if (editTitleInvalid) {
          <span class="card__error">Title is required</span>
        }
        <span class="card__counter">{{ editTitle.length }}/100</span>
      </div>
      <div class="card__field">
        <textarea
          class="card__edit-textarea"
          [(ngModel)]="editDescription"
          (keydown.escape)="cancelEdit()"
          [maxlength]="500"
          placeholder="Description (optional)"
          rows="2"
          aria-label="Task description"
        ></textarea>
        <span class="card__counter">{{ editDescription.length }}/500</span>
      </div>
      <div class="card__edit-actions">
        <button class="card__btn card__btn--save" (click)="saveEdit()" type="button">Save</button>
        <button class="card__btn card__btn--cancel" (click)="cancelEdit()" type="button">Cancel</button>
      </div>
    </div>
  }
</div>
