<main class="weather-app" role="main">
  <header class="app-header">
    <h1 class="app-title">Weather Search</h1>
    <p class="app-description">Get current weather conditions for any city worldwide</p>
  </header>

  <section class="search-section">
    <app-weather-search
      (searchSubmitted)="onSearchSubmitted($event)"
      (inputValidationChange)="onInputValidationChange($event)"
      aria-label="Weather search form">
    </app-weather-search>
  </section>

  <section class="results-section">
    <app-weather-display
      [searchState]="searchState()"
      (retrySearch)="onRetrySearch()"
      (clearResults)="onClearResults()"
      aria-label="Weather results">
    </app-weather-display>
  </section>

  <!-- Screen reader announcements -->
  <div
    id="app-announcer"
    class="sr-only"
    aria-live="polite"
    aria-atomic="true">
  </div>
</main>

<router-outlet />
