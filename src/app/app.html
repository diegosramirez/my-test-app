<div class="weather-app">
  <main class="main-container">
    <app-weather-search
      (weatherData)="onWeatherData($event)"
      (searchError)="onSearchError($event)"
    ></app-weather-search>

    @if (currentError()) {
      <app-error-display
        [error]="currentError()"
        (retry)="onRetrySearch()"
        (dismiss)="onDismissError()"
      ></app-error-display>
    }

    @if (currentWeatherData()) {
      <app-weather-display
        [weatherData]="currentWeatherData()"
      ></app-weather-display>
    }
  </main>
</div>
