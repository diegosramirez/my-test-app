<main class="main">
  <div class="app-container">
    <header class="header">
      <h1>{{ title() }} - Markdown Preview Demo</h1>
      <p>Experience real-time markdown editing with live preview, scroll synchronization, and responsive design.</p>
    </header>

    <div class="demo-container">
      <app-markdown-preview
        [initialContent]="sampleMarkdown"
        [config]="{
          debounceMs: 100,
          enableScrollSync: true,
          enableErrorIndicators: true,
          placeholder: 'Start typing your markdown here...'
        }"
        (contentChange)="onContentChange($event)"
        (parseComplete)="onParseComplete($event)"
        (parseError)="onParseError($event)"
        (scrollSync)="onScrollSync($event)">
      </app-markdown-preview>
    </div>

    <footer class="footer">
      <p>Built with Angular {{ getAngularVersion() }} • Powered by marked.js and DOMPurify</p>
    </footer>
  </div>
</main>

<router-outlet />
